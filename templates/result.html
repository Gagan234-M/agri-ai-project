
<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
            padding:40px;
        }
        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            width:600px;
            margin:auto;
        }
        img{
            width:300px;
            border-radius:10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Prediction Result</h1>

        <img src="/{{ image_path }}" alt="Uploaded Image"><br><br>

        <h2>Disease: {{ prediction }}</h2>

        <h3>Why this disease?</h3>
        <p>{{ explanation }}</p>

        <h3>Suggested Remedies</h3>
        <ul>
            {% for remedy in remedies %}
            <li>{{ remedy }}</li>
            {% endfor %}
        </ul>

        <a href="/">Try Another Image</a>
    </div>
</body>
</html>
